openapi: 3.1.0
info:
  title: Cudara Inference API
  description: Lightweight CUDA inference server providing an Ollama-compatible interface for LLMs, VLMs, and Embeddings.
  version: 0.0.1
  contact:
    name: Julio Galindo
servers:
  - url: http://localhost:8000
    description: Local development server

paths:
  # --- INFERENCE ENDPOINTS ---
  /api/generate:
    post:
      tags: [Inference]
      summary: Generate a response (Ollama compatible)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateRequest'
      responses:
        '200':
          description: Successful completion (JSON or NDJSON stream)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerateResponse'
        '400':
          $ref: '#/components/responses/AppError'

  /api/embed:
    post:
      tags: [Inference]
      summary: Generate embeddings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmbedRequest'
      responses:
        '200':
          description: Successful embedding generation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmbedResponse'

  # --- MANAGEMENT ENDPOINTS ---
  /api/tags:
    get:
      tags: [Models]
      summary: List local models
      description: Returns all models available in the local registry/storage.
      responses:
        '200':
          description: List of models
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PsResponse'

  /api/ps:
    get:
      tags: [Models]
      summary: List running models
      description: Returns the model currently loaded into VRAM.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PsResponse'

  /api/show:
    post:
      tags: [Models]
      summary: Show model information
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShowRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShowResponse'

  /api/delete:
    delete:
      tags: [Models]
      summary: Delete a model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteRequest'
      responses:
        '200':
          description: Model deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "success" }

  /api/version:
    get:
      tags: [System]
      summary: Get server version
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  version: { type: string, example: "0.0.1" }

components:
  responses:
    AppError:
      description: Custom Application Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # --- REQUESTS ---
    GenerateRequest:
      type: object
      required: [model, prompt]
      properties:
        model: { type: string }
        prompt: { type: string }
        system: { type: string }
        stream: { type: boolean, default: false }
        images:
          type: array
          items: { type: string, description: "Base64 encoded images" }
        options:
          type: object
          properties:
            temperature: { type: number, default: 0.7 }
            top_p: { type: number, default: 0.9 }
            max_new_tokens: { type: integer, default: 512 }

    EmbedRequest:
      type: object
      required: [model, input]
      properties:
        model: { type: string }
        input:
          oneOf:
            - type: string
            - type: array
              items: { type: string }

    ShowRequest:
      type: object
      required: [model]
      properties:
        model: { type: string }

    DeleteRequest:
      type: object
      required: [model]
      properties:
        model: { type: string }

    # --- RESPONSES ---
    GenerateResponse:
      type: object
      properties:
        model: { type: string }
        created_at: { type: string, format: date-time }
        response: { type: string }
        done: { type: boolean }
        context: { type: array, items: { type: integer } }
        total_duration: { type: integer }

    EmbedResponse:
      type: object
      properties:
        model: { type: string }
        embeddings:
          type: array
          items: { type: array, items: { type: number } }

    PsResponse:
      type: object
      properties:
        models:
          type: array
          items:
            $ref: '#/components/schemas/ModelDetails'

    ShowResponse:
      type: object
      properties:
        modelfile: { type: string }
        parameters: { type: string }
        template: { type: string }
        details:
          $ref: '#/components/schemas/ModelMeta'

    ModelDetails:
      type: object
      properties:
        name: { type: string }
        model: { type: string }
        modified_at: { type: string, format: date-time }
        size: { type: integer }
        size_vram: { type: integer }
        details:
          $ref: '#/components/schemas/ModelMeta'

    ModelMeta:
      type: object
      properties:
        format: { type: string }
        family: { type: string }
        parameter_size: { type: string }
        quantization_level: { type: string }

    ErrorResponse:
      type: object
      properties:
        error: { type: string }
        status_code: { type: integer }